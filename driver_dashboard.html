<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - BRT Peshawar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --green: #0b3618; --green2: #1a5c2e; --teal: #00a896; --bg: #f3f7f5; --text: #1f2933; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); }
        nav { background: var(--green); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; background: #d32f2f; padding: 10px 14px; border-radius: 10px; }
        main { max-width: 1120px; margin: 0 auto; padding: 30px 20px; }
        .hero { background: linear-gradient(135deg, var(--green), var(--teal)); color: white; padding: 30px; border-radius: 24px; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
        .card { background: white; border-radius: 18px; padding: 22px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
        .card h3 { color: var(--green); margin-bottom: 12px; }
        .assignment { border-left: 5px solid var(--teal); }
        .pill { display: inline-block; background: #e7f7f4; color: #00796b; padding: 5px 10px; border-radius: 999px; font-size: 12px; margin-top: 8px; }
        .timeline { display: grid; gap: 10px; max-height: 420px; overflow-y: auto; }
        .stop { background: #f8fbfa; padding: 12px; border-radius: 12px; border-left: 4px solid var(--green); }
        .muted { color: #607080; }
    </style>
</head>
<body>
    <nav>
        <strong><i class="fas fa-id-card"></i> Driver Dashboard</strong>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
    <main>
        <section class="hero">
            <h1>Welcome, {{ name }}</h1>
            <p>View your assigned schedules, buses, and route stops.</p>
        </section>
        <section class="grid">
            <div class="card assignment">
                <h3><i class="fas fa-calendar-check"></i> Assigned Trips</h3>
                <div id="assignments">Loading...</div>
            </div>
            <div class="card">
                <h3><i class="fas fa-route"></i> Route Stops</h3>
                <div id="stops" class="timeline"><p class="muted">Select an assigned trip to view stops.</p></div>
            </div>
        </section>
    </main>

    <script>
        let latestAssignment = null;

        async function api(url) {
            const response = await fetch(url);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        function headway(item) {
            return item.headway_min === item.headway_max ? `${item.headway_min} min` : `${item.headway_min}-${item.headway_max} min`;
        }

        async function loadAssignments() {
            const assignments = await api('/api/driver/assignments');
            const container = document.getElementById('assignments');
            if (!assignments.length) {
                container.innerHTML = '<p class="muted">No assigned trips yet.</p>';
                return;
            }
            latestAssignment = assignments[0];
            container.innerHTML = assignments.map(item => `
                <div class="stop" onclick="loadStops(${item.route_id})" style="cursor:pointer">
                    <strong>${item.route_name}</strong><br>
                    Bus ${item.bus_number} | Platform ${item.platform}<br>
                    <span class="muted">${item.departure_time} to ${item.arrival_time} | ${item.operating_days}</span><br>
                    <span class="pill">${item.status}</span>
                    <span class="pill">Every ${headway(item)}</span>
                </div>
            `).join('');
            loadStops(latestAssignment.route_id);
        }

        async function loadStops(routeId) {
            const stops = await api(`/api/driver/route/${routeId}/stops`);
            document.getElementById('stops').innerHTML = stops.map(stop => `
                <div class="stop">
                    <strong>${stop.stop_order}. ${stop.station_name}</strong>
                </div>
            `).join('');
        }

        loadAssignments().catch(error => alert(error.message));
    </script>
</body>
</html>
