<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Login - BRT Peshawar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, #0b3618 0%, #1a5c2e 100%); }
        .card { width: 100%; max-width: 440px; background: white; border-radius: 24px; padding: 36px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
        .logo { text-align: center; color: #0b3618; margin-bottom: 20px; }
        .logo i { font-size: 44px; color: #00a896; }
        h1 { color: #0b3618; text-align: center; margin-bottom: 8px; }
        p { text-align: center; color: #666; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #0b3618; font-weight: 700; margin-bottom: 8px; }
        input { width: 100%; border: 2px solid #e5ece8; border-radius: 12px; padding: 14px; font-size: 15px; }
        input:focus { outline: none; border-color: #00a896; }
        .btn { width: 100%; border: 0; border-radius: 12px; padding: 14px; background: #0b3618; color: white; font-weight: 800; font-size: 15px; cursor: pointer; }
        .links { margin-top: 18px; display: flex; justify-content: space-between; gap: 10px; font-size: 14px; }
        .links a { color: #0b3618; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><i class="fas fa-user"></i></div>
        <h1>Passenger Login</h1>
        <p>Plan trips, book tickets, recharge balance, and send complaints.</p>
        <form>
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" name="username" placeholder="demo or demo@brt.local" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="demo123" required>
            </div>
            <button class="btn" type="submit">Login as Passenger</button>
        </form>
        <div class="links">
            <a href="passenger_signup.html">Create passenger account</a>
            <a href="index.html">Back</a>
        </div>
    </div>
</body>
</html>
