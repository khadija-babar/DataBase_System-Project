<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Signup - BRT Peshawar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #0b3618, #1a5c2e); padding: 20px; }
        .card { width: 100%; max-width: 500px; background: white; border-radius: 24px; padding: 34px; box-shadow: 0 18px 50px rgba(0,0,0,.25); }
        h1 { color: #0b3618; text-align: center; margin-bottom: 8px; }
        p { color: #666; text-align: center; margin-bottom: 22px; }
        label { display: block; color: #0b3618; font-weight: 700; margin: 13px 0 7px; }
        input { width: 100%; padding: 13px; border: 2px solid #e2e8e4; border-radius: 12px; font-size: 15px; }
        button { width: 100%; margin-top: 20px; padding: 14px; border: 0; border-radius: 12px; background: #0b3618; color: white; font-weight: 800; cursor: pointer; }
        .flash { padding: 12px; border-radius: 10px; margin-bottom: 10px; background: #ffebee; color: #c62828; }
        .links { display: flex; justify-content: space-between; margin-top: 16px; }
        a { color: #0b3618; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card">
        <h1><i class="fas fa-user-plus"></i> Passenger Signup</h1>
        <p>Create your account to book BRT trips.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST" action="{{ url_for('signup') }}">
            <label>Name</label>
            <input type="text" name="username" required placeholder="Your full name">
            <label>Email</label>
            <input type="email" name="email" required placeholder="you@example.com">
            <label>Phone Number</label>
            <input type="tel" name="phone_number" placeholder="03000000000">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Minimum 6 characters">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required>
            <button type="submit">Create Account</button>
        </form>
        <div class="links">
            <a href="{{ url_for('passenger_login') }}">Passenger login</a>
            <a href="{{ url_for('role_select') }}">Back</a>
        </div>
    </div>
</body>
</html>
